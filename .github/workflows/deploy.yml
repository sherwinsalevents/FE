name: Build and Deploy Docker Image

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'
 
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOCKER_IMAGE_PREFIX: ${{ secrets.DOCKER_USERNAME }}/ticketingsal-frontend
  SSH_HOST: ${{ secrets.SERVER_IP }}
  SSH_USER: ${{ secrets.SSH_USER }}
  SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
  SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
  APPLICATION_PORT: ${{ secrets.APPLICATION_PORT }}
  APPLICATION_NAME:  ${{ secrets.APPLICATION_NAME }}

jobs:
  checkout:
    runs-on: ubuntu-latest
    outputs:
      branch_name: ${{ steps.vars.outputs.branch_name }}
      image_tag: ${{ steps.vars.outputs.image_tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set Branch Variables
        id: vars
        run: |
          BRANCH_NAME=${GITHUB_REF#refs/heads/}
          SAFE_BRANCH_NAME=$(echo "$BRANCH_NAME" | sed 's#[^a-zA-Z0-9_.-]#-#g')
          IMAGE_TAG=${{ github.run_number }}
          echo "branch_name=$SAFE_BRANCH_NAME" >> $GITHUB_OUTPUT
          echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT

  build:
    runs-on: ubuntu-latest
    needs: checkout
    environment: prod
    steps:
      - uses: actions/checkout@v3
      - uses: docker/setup-buildx-action@v3
      - uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-
      - name: Build Docker Image
        run: |
          IMAGE_NAME=${{ env.DOCKER_IMAGE_PREFIX }}-${{ needs.checkout.outputs.branch_name }}
          IMAGE_TAG=${{ needs.checkout.outputs.image_tag }}
          docker buildx build \
            --cache-from=type=local,src=/tmp/.buildx-cache \
            --cache-to=type=local,dest=/tmp/.buildx-cache-new \
            -t $IMAGE_NAME:$IMAGE_TAG \
            -f ./Dockerfile \
            --load \
            .
      - name: Save image artifact
        run: |
          docker save -o image.tar ${{ env.DOCKER_IMAGE_PREFIX }}-${{ needs.checkout.outputs.branch_name }}:${{ needs.checkout.outputs.image_tag }}
      - uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: image.tar

  push:
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    needs: [checkout, build]
    environment: prod
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: docker-image
      - name: Load image
        run: docker load -i image.tar
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Push Docker Image
        run: |
          IMAGE_NAME=${{ env.DOCKER_IMAGE_PREFIX }}-${{ needs.checkout.outputs.branch_name }}
          IMAGE_TAG=${{ needs.checkout.outputs.image_tag }}
          docker push $IMAGE_NAME:$IMAGE_TAG
      - name: Add Image Info to Summary
        run: |
          echo "### 🚀 Docker Image Pushed" >> $GITHUB_STEP_SUMMARY
          echo "- ${{ env.DOCKER_IMAGE_PREFIX }}-${{ needs.checkout.outputs.branch_name }}:${{ needs.checkout.outputs.image_tag }}" >> $GITHUB_STEP_SUMMARY


  deploy:
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    needs: [checkout, push] 
    environment: prod
    steps:
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            IMAGE_NAME="${{ env.DOCKER_IMAGE_PREFIX }}-${{ needs.checkout.outputs.branch_name }}"
            IMAGE_TAG="${{ needs.checkout.outputs.image_tag }}"
            APPLICATION_PORT=${{ env.APPLICATION_PORT }}

            ###############################################
            # CLEAN DOCKER + UPDATE IMAGE
            ###############################################
            echo "${{ secrets.SSH_PASSWORD }}" | sudo -S docker system prune -af --volumes || true
            echo "${{ secrets.SSH_PASSWORD }}" | sudo -S docker pull $IMAGE_NAME:$IMAGE_TAG

            # Stop old container
            if echo "${{ secrets.SSH_PASSWORD }}" | sudo -S docker ps -a --format '{{.Names}}' | grep -q '${{ secrets.APPLICATION_NAME }}'; then
              echo "${{ secrets.SSH_PASSWORD }}" | sudo -S docker stop ${{ secrets.APPLICATION_NAME }}
              echo "${{ secrets.SSH_PASSWORD }}" | sudo -S docker rm ${{ secrets.APPLICATION_NAME }}
            fi

            # Run frontend container (React + Nginx inside Docker)
            echo "${{ secrets.SSH_PASSWORD }}" | sudo -S docker run -d \
              --name ${{ secrets.APPLICATION_NAME }} \
              -p 3000:80 \
              $IMAGE_NAME:$IMAGE_TAG


            ###############################################
            # INSTALL NGINX + CERTBOT IF NOT INSTALLED
            ###############################################
            if ! command -v nginx >/dev/null 2>&1; then
              echo "${{ secrets.SSH_PASSWORD }}" | sudo -S apt update
              echo "${{ secrets.SSH_PASSWORD }}" | sudo -S apt install -y nginx
            fi

            if ! command -v certbot >/dev/null 2>&1; then
              echo "${{ secrets.SSH_PASSWORD }}" | sudo -S apt install -y certbot python3-certbot-nginx
            fi


            ###############################################
            # 1. CREATE TEMPORARY HTTP CONFIG (NO SSL)
            #    TO ENSURE CERTBOT CAN VALIDATE DOMAIN
            ###############################################
            NGINX_CONF="/etc/nginx/conf.d/portal.salevents.net.conf"

            echo "${{ secrets.SSH_PASSWORD }}" | sudo -S tee $NGINX_CONF > /dev/null <<'EOF'
            server {
                listen 80;
                server_name portal.salevents.net;

                location / {
                    proxy_pass http://127.0.0.1:3000;
                    proxy_set_header Host $host;
                }

                # ACME Challenge Required for Certbot
                location /.well-known/acme-challenge/ {
                    root /var/www/html;
                }
            }
            EOF

            echo "${{ secrets.SSH_PASSWORD }}" | sudo -S nginx -t
            echo "${{ secrets.SSH_PASSWORD }}" | sudo -S systemctl restart nginx


            ###############################################
            # 2. ISSUE / RENEW SSL CERTIFICATE
            ###############################################
            echo "${{ secrets.SSH_PASSWORD }}" | sudo -S certbot certonly \
              --webroot -w /var/www/html \
              -d portal.salevents.net \
              --non-interactive --agree-tos -m ${{ secrets.SSL_EMAIL }} || true


            ###############################################
            # 3. CREATE FULL HTTPS CONFIG (NOW CERT EXISTS)
            ###############################################
            echo "${{ secrets.SSH_PASSWORD }}" | sudo -S tee $NGINX_CONF > /dev/null <<'EOF'
            # Redirect HTTP → HTTPS
            server {
                listen 80;
                server_name portal.salevents.net;
                return 301 https://$host$request_uri;
            }

            # HTTPS Server
            server {
                listen 443 ssl;
                server_name portal.salevents.net;

                ssl_certificate /etc/letsencrypt/live/portal.salevents.net/fullchain.pem;
                ssl_certificate_key /etc/letsencrypt/live/portal.salevents.net/privkey.pem;

                location / {
                    proxy_pass http://127.0.0.1:3000;
                    proxy_http_version 1.1;
                    proxy_set_header Upgrade $http_upgrade;
                    proxy_set_header Connection "upgrade";
                    proxy_set_header Host $host;
                    proxy_cache_bypass $http_upgrade;
                }

                # Security
                location ~ /\.(?!well-known).* {
                    deny all;
                }
            }
            EOF


            ###############################################
            # 4. TEST + RELOAD NGINX WITH HTTPS CONFIG
            ###############################################
            echo "${{ secrets.SSH_PASSWORD }}" | sudo -S nginx -t
            echo "${{ secrets.SSH_PASSWORD }}" | sudo -S systemctl restart nginx


            ###############################################
            # 5. SET AUTO-RENEW (TWICE A DAY)
            ###############################################
            CRON_JOB="0 */12 * * * certbot renew --post-hook \"systemctl reload nginx\""

            # Remove any existing crontab (including corrupted "-") and install new cron safely
            echo "$CRON_JOB" | echo "${{ secrets.SSH_PASSWORD }}" | sudo -S crontab -

            # Optional: verify cron installed
            echo "Installed cron jobs:"
            echo "${{ secrets.SSH_PASSWORD }}" | sudo -S crontab -l

            echo "Deployment completed successfully."
  cleanup:
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    needs: deploy 
    steps:
      - run: docker rmi ${{ env.DOCKER_IMAGE_PREFIX }}-${{ needs.checkout.outputs.branch_name }}:${{ needs.checkout.outputs.image_tag }} || true

  dependabot:
    runs-on: ubuntu-latest
    needs: checkout
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v3
      - name: Check and Merge Dependabot PRs
        run: |
          pr_count=$(gh pr list --state open --label "dependencies" --json number --jq '. | length')
          if [ "$pr_count" -gt 0 ]; then
            gh pr merge $(gh pr list --state open --label "dependencies" --json number --jq '.[0].number') --merge --admin
          fi

